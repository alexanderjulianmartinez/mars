  - id: experiment-4
    name: Confidence & Contradiction
    doc: docs/SALIENCE_MEMORY_CONFIDENCE_AND_CONTRADICTION.md
  - id: experiment-5
    name: Execution Impact
    doc: docs/SALIENCE_MEMORY_EXECUTION_IMPACT.md

reproduction_commands:
